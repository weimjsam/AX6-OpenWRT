name: Build OpenWRT for AX6-NSS

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt.git
  REPO_BRANCH: main
  CONFIG_FILE: AX6-IPQ/AX6_Nss.config
  DIY_SH: AX6-IPQ/diy.sh
  FILES: AX6-IPQ/files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Check machine configuration
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo "云编译建议取消勾选Node.js及其相关插件！"
        echo "已知CPU型号（降序）：7763,8370C,8272CL,8171M,E5系列"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo -e "CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        sudo lshw -short -C memory | grep GiB
        echo -e "\n"
        echo "--------------------------硬盘信息--------------------------"
        echo -e  "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
        echo "硬盘详情："
        df -Th
        
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Freeing up disk space
      uses: easimon/maximize-build-space@master
      with: 
        root-reserve-mb: 10240
        swap-size-mb: 1
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="
        
    - name: Checkout
      uses: actions/checkout@main
      
    - name: Initialize environment (全面加速与超时防卡死)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: | 
        echo "======== [優化 1] 切換為阿里雲鏡像源，加速下載 ========"
        sudo sed -i 's#://ubuntu.com#://aliyun.com#g' /etc/apt/sources.list
        sudo sed -i 's#://ubuntu.com#://aliyun.com#g' /etc/apt/sources.list
        sudo sed -i 's#://ubuntu.com#://aliyun.com#g' /etc/apt/sources.list

        echo "======== [優化 2] 注入全局超時與重試機制（單次最長 30 秒） ========"
        # 建立 apt 配置文件，強制規定任何下載超過 30 秒直接斷開並重試，絕不死等
        echo 'Acquire::http::Timeout "30";' | sudo tee -a /etc/apt/apt.conf.d/99timeout
        echo 'Acquire::ftp::Timeout "30";' | sudo tee -a /etc/apt/apt.conf.d/99timeout
        echo 'Acquire::Retries "3";' | sudo tee -a /etc/apt/apt.conf.d/99timeout

        echo "======== [優化 3] 執行安全更新 ========"
        sudo -E apt-get -qq update -y || echo "提示：部分源更新有微弱波動，已自動忽略"
        
        echo "======== [優化 4] 安裝編譯依賴包 ========"
        sudo -E apt-get -qq install -y $(curl -fsSL https://githubusercontent.com) || true
        
        echo "======== [優化 5] 清理緩存 ========"
        sudo -E apt-get -qq autoremove --purge -y
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE


    - name: Clone source code
      working-directory: ./
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: cache wrt build
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: AX6-NSS-${{ env.REPO_BRANCH }}
        prefix: ${{ github.workspace }}/openwrt
        
    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config
      run: |
        [ -e $FILES ] && mv $FILES openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_SH

    # - name: SSH connect to Actions
      # uses: P3TERX/ssh2actions@main
      # if: (github.event.inputs.ssh == 'true') || contains(github.event.action, 'ssh')

    - name: Download package
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        chmod -R 755 openwrt
        cd openwrt
        # echo -e "$(nproc) thread compile"
        # make -j$(nproc) || make -j1 || make -j1 V=s
        # echo "compile_status=success" >> $GITHUB_ENV
                
        echo "======== [核心修復] 注入 opkg 強制覆蓋參數，無視任何檔案衝突 ========"
        # 建立全局 opkg 配置覆蓋，強制允許檔案踩踏（force-overwrite）
        mkdir -p staging_dir/target-aarch64_cortex-a53_musl/root-qualcommax/etc/
        echo "option force_overwrite 1" >> staging_dir/target-aarch64_cortex-a53_musl/root-qualcommax/etc/opkg.conf
        
        # 同步向主系統環境寫入強制覆蓋參數
        mkdir -p build_dir/target-aarch64_cortex-a53_musl/root-qualcommax/etc/
        echo "option force_overwrite 1" >> build_dir/target-aarch64_cortex-a53_musl/root-qualcommax/etc/opkg.conf
        
        echo "======== 參數注入完畢，開始全速編譯！ ========"
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "compile_status=success" >> $GITHUB_ENV

    # - name : Upload packages
      # uses: actions/upload-artifact@master
      # if: always()
      # with:
        # name: AX6-NSS
        # path: openwrt/bin/targets
    - name: cp output to upload file
      run: |
        df -hT
        mkdir upload
        cp openwrt/bin/targets/*/*/*.ubi upload/
        cp openwrt/bin/targets/*/*/*.bin upload/
        
    - name: Get Current Date
      run: echo "CURRENT_DATE=$(date '+%Y%m%d%H%M%S')" >> $GITHUB_ENV
      
    - name: Upload OpenWrt Firmware to Release
      uses: ncipollo/release-action@main
      with:
        tag: AX6_NSS_${{ env.CURRENT_DATE }}
        artifacts: upload/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          基于VIKINGYFY合并的immortalwrt构建
          首次使用建议全新刷写
          NSS满血加速！
          * 基本信息
          IP: 192.168.1.1
          账户: root
          密码: 空
          
    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 10
        delete_tags : true
